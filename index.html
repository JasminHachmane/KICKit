<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KICKit | Startscherm</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="start">
  <main class="screen">
    <div class="stadium-bg"></div>
    <div class="top-glass left"></div>
    <div class="top-glass right"></div>

    <header class="topbar">
      <div class="top-label">beginscherm</div>
    </header>

    <section class="center-layout start-layout">
      <img src="img/logo kickit.png" alt="KICKit logo" class="main-logo">

      <div class="mascot-row">
        <img src="img/leeuw.png" alt="leeuw" class="start-mascot">
        <img src="img/draak.png" alt="draak" class="start-mascot">
        <img src="img/vos.png" alt="vos" class="start-mascot">
        <img src="img/kat.png" alt="kat" class="start-mascot">
      </div>

      <button class="big-button blue" id="startBtn">START</button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
